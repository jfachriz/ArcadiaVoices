name: Build VST Plugins

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Build WebView UI
      # We use bash as the shell so commands work consistently
      shell: bash
      run: |
        npm ci
        npm run build
        rm -rf iPlug2OOS/ArcadiaVoices/resources/web
        cp -R dist iPlug2OOS/ArcadiaVoices/resources/web
        
    - name: Configure CMake
      run: cmake -S iPlug2OOS -B build -G "Visual Studio 17 2022" -A x64

    - name: Build C++ Plugin
      run: cmake --build build --config Release
      
    - name: Upload Windows Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Windows-VST3
        path: build/ArcadiaVoices/AV.vst3/

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Build WebView UI
      run: |
        npm ci
        npm run build
        rm -rf iPlug2OOS/ArcadiaVoices/resources/web
        cp -R dist iPlug2OOS/ArcadiaVoices/resources/web

    - name: Install Linux Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libfreetype6-dev libxinerama-dev libxcursor-dev libxext-dev libxrandr-dev libasound2-dev libjack-jackd2-dev libgl1-mesa-dev libwebkit2gtk-4.0-dev libcurl4-gnutls-dev
        
    - name: Configure CMake
      run: cmake -S iPlug2OOS -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build C++ Plugin
      run: cmake --build build --config Release
      
    - name: Upload Linux Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Linux-VST3
        path: build/ArcadiaVoices/AV.vst3/
